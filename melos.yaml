name: ethio_dev_kit

packages:
  - packages/**

command:
  bootstrap:
    # Ensure package graph is resolved with pub.
    runPubGetInParallel: true

scripts:
  analyze:
    description: Run `dart analyze` (fatal on infos/warnings) in all packages.
    exec: dart analyze --fatal-infos --fatal-warnings .

  test:
    description: Run tests in all packages that have a test/ directory.
    # `melos exec` runs the command in each matching package directory.
    exec: dart test
    packageFilters:
      dirExists: test

  format-check:
    description: Verify formatting across all packages.
    exec: dart format --output=none --set-exit-if-changed .
