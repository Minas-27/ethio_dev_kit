publish_to: none
version: 1.0.0

environment:
  sdk: ^3.6.0
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  ethiopian_calendar:
    path: ../../

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
