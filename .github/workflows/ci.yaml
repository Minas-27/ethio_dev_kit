name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Pure-Dart packages: analyze + test with the Dart SDK only.
  dart-packages:
    name: dart • ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # `analyze` scopes `dart analyze` per package. ethio_calendar ships
        # a supplementary Flutter demo under example/flutter_app/ that requires
        # the Flutter SDK — which this Dart-only job does not have — so it is
        # excluded here and only its pure-Dart sources (lib, test, and the
        # standalone example) are analyzed. ethio_validators has no Flutter
        # code, so it analyzes the whole package directory.
        include:
          - package: ethio_calendar
            analyze: lib test example/ethio_calendar_example.dart
          - package: ethio_validators
            analyze: .
    defaults:
      run:
        working-directory: packages/${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: dart analyze --fatal-infos --fatal-warnings ${{ matrix.analyze }}
      - run: dart test

  # Flutter packages: analyze + test with the Flutter SDK.
  flutter-packages:
    name: flutter • ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - ethiopic_typography
          - amharic_stt
    defaults:
      run:
        working-directory: packages/${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: flutter analyze
      - run: flutter test
